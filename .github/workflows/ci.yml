name: CI

# Typecheck-only CI. radare2 is NOT installed on GitHub runners, so we do NOT
# run the r2-dependent integration tests here (test/smoke.mjs needs a live r2
# MCP server — run that against a deployed container instead, see README).
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # no package-lock.json is committed, so use install (not ci) and skip the
        # lockfile-dependent npm cache above.
        run: npm install --no-fund --no-audit

      - name: Build (typecheck via tsc)
        run: npm run build
